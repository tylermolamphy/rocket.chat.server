# fail2ban jails for the launcher nginx (port 80)
# Log file: /root/launcher/logs/access.log
#
# backend=polling is required — the default (systemd) backend ignores logpath
# and reads from journald instead, which doesn't receive nginx container logs.

[nginx-exploit-scan]
enabled   = true
port      = http,https
filter    = nginx-exploit-scan
action    = iptables-docker-user[name=nginx-exploit, protocol=tcp]
logpath   = /root/launcher/logs/access.log
backend   = polling
maxretry  = 1
findtime  = 60
bantime   = 7d
