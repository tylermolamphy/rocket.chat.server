# fail2ban action: block IPs in the DOCKER-USER iptables chain
#
# Standard fail2ban actions target the INPUT chain, which Docker bypasses
# entirely via its own iptables DNAT rules. Container traffic flows through
# FORWARD → DOCKER-USER, so bans must go here to have any effect.
#
# This action creates a dedicated sub-chain (f2b-<name>) and jumps to it
# from DOCKER-USER, matching the same pattern as the built-in iptables actions.

[Definition]
actionstart = <iptables> -N f2b-<name>
              <iptables> -A f2b-<name> -j RETURN
              <iptables> -I DOCKER-USER -j f2b-<name>

actionstop = <iptables> -D DOCKER-USER -j f2b-<name>
             <iptables> -F f2b-<name>
             <iptables> -X f2b-<name>

actioncheck = <iptables> -n -L DOCKER-USER | grep -q 'f2b-<name>[ \t]'

actionban = <iptables> -I f2b-<name> 1 -s <ip> -j DROP

actionunban = <iptables> -D f2b-<name> -s <ip> -j DROP

[Init]
name = default
lockingopt = -w
iptables = /usr/sbin/iptables <lockingopt>
